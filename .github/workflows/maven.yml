# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Build Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
        settings-path: ${{ github.workspace }} # location for the settings.xml file
        cache: maven

    # --- TAHAP 1 & 2: BUILD, TESTING, DAN QUALITY INSPECTION (SONARCLOUD) ---
    # Langkah ini selalu berjalan setiap ada push ke main atau pull request
    - name: Build, test, and analyze
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: mvn verify sonar:sonar -Dsonar.host.url=https://sonarcloud.io -Dsonar.organization=raatra10 -Dsonar.projectKey=raatra10103022300123_RAFI-ATHALLAH-R_Praktik-CI-CD

    # --- TAHAP 3: CI/CD DEPLOYMENT (GITHUB PACKAGES) ---
    # Langkah di bawah ini HANYA akan dieksekusi jika trigger-nya adalah pembuatan RELEASE baru
    - name: Verify settings.xml exists in .m2 directory
      run: ls -al ~/.m2

    - name: Publish to GitHub Packages Apache Maven
      run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
